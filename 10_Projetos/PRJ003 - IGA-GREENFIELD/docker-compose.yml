services:
  postgres:
    image: postgres:16
    container_name: iga-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - iga-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  midpoint:
    image: evolveum/midpoint:4.10
    container_name: iga-midpoint
    ports:
      - "8080:8080"
    environment:
      MP_SET_midpoint_repository_database: postgresql
      MP_SET_midpoint_repository_type: native
      MP_SET_midpoint_repository_jdbcUrl: 'jdbc:postgresql://postgres:5432/${DB_NAME}?user=${DB_USER}&password=${DB_PASSWORD}'
      
      JAVA_OPTS: "-Xms512m -Xmx1024m -Dmidpoint.repository.database=postgresql -Dfile.encoding=UTF8"
      
      MP_KEYSTORE_PASSWORD: ${MP_KEYSTORE_PASSWORD}
      MP_SET_midpoint_administrator_initialPassword: ${MP_ADMIN_PASSWORD}
    volumes:
      - ./data/midpoint/var:/opt/midpoint/var
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iga-network

networks:
  iga-network:
    driver: bridge