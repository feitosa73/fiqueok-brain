docker compose ps                 # Status dos containers

# Diagnóstico
docker logs iga-midpoint          # Logs do midPoint
docker logs iga-postgres          # Logs do PostgreSQL
docker exec -it iga-midpoint bash # Acessar shell do container
docker stats                      # Uso de recursos

# ✅ NOVO v2.0: Validação de Repositório
docker logs iga-midpoint 2>&1 | grep "midpoint.repository.database"

# Manutenção
docker system prune -f            # Limpar cache
docker volume ls                  # Listar volumes
docker network ls                 # Listar redes
```

### **13.4. Portas Utilizadas**

| Porta | Serviço | Protocolo | Acesso |
|-------|---------|-----------|--------|
| 22 | SSH | TCP | Externo (para administração) |
| 8080 | midPoint Web UI | TCP | Externo (interface web) |
| 5432 | PostgreSQL | TCP | Interno (apenas entre containers) |

### **13.5. Variáveis de Ambiente Importantes**

| Variável | Descrição | Exemplo |
|----------|-----------|---------|
| `POSTGRES_DB` | Nome do banco de dados | `midpoint` |
| `POSTGRES_USER` | Usuário do PostgreSQL | `midpoint_user` |
| `POSTGRES_PASSWORD` | Senha do PostgreSQL | `senha_segura_123` |
| `MIDPOINT_ADMIN_PASSWORD` | Senha do administrador do midPoint | `admin_senha_456` |
| **✅ v2.0** `MIDPOINT_REPOSITORY_DATABASE_TYPE` | Tipo de repositório | `postgresql` |
| **✅ v2.0** `MIDPOINT_REPOSITORY_JDBC_URL` | URL JDBC do banco | `jdbc:postgresql://postgres:5432/midpoint` |
| **✅ v2.0** `MIDPOINT_REPOSITORY_JDBC_USERNAME` | Usuário JDBC | `${POSTGRES_USER}` |
| **✅ v2.0** `MIDPOINT_REPOSITORY_JDBC_PASSWORD` | Senha JDBC | `${POSTGRES_PASSWORD}` |

