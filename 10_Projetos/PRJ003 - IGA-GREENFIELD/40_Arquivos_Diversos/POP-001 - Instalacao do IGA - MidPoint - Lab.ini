## **APÊNDICE C: ANÁLISE COMPARATIVA v1.0 vs v2.0**

### **Diferenças Críticas**

| Aspecto | v1.0 (Incorreta) | v2.0 (Corrigida) |
|---------|------------------|------------------|
| **Variável de URL** | `MIDPOINT_REPOSITORY_DATABASE_URL` | `MIDPOINT_REPOSITORY_JDBC_URL` |
| **Variável de Usuário** | `MIDPOINT_REPOSITORY_DATABASE_USERNAME` | `MIDPOINT_REPOSITORY_JDBC_USERNAME` |
| **Variável de Senha** | `MIDPOINT_REPOSITORY_DATABASE_PASSWORD` | `MIDPOINT_REPOSITORY_JDBC_PASSWORD` |
| **Tipo de Repositório** | ❌ Ausente | ✅ `MIDPOINT_REPOSITORY_DATABASE_TYPE: postgresql` |
| **Comportamento** | Fallback silencioso para H2 | Conecta corretamente ao PostgreSQL |
| **Login** | ❌ Falha (senha não persiste) | ✅ Sucesso com senha definida |
| **Dados** | Armazenados em H2 temporário | Armazenados em PostgreSQL persistente |

### **Lições Aprendidas**

1. **Documentação da Imagem Oficial:** As variáveis de ambiente do midPoint 4.8 exigem sintaxe específica `JDBC` para configuração de repositório externo.

2. **Fallback Silencioso:** midPoint não exibe erro explícito quando variáveis são ignoradas, apenas ativa H2 como fallback.

3. **Validação Essencial:** Sempre verificar `docker logs` para confirmar `midpoint.repository.database .:. postgresql`.

4. **Impacto de Configuração Incorreta:** 
   - Dados não persistem corretamente
   - Credenciais não funcionam conforme esperado
   - Performance degradada (H2 vs PostgreSQL)

